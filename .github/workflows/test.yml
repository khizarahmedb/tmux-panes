name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        bun-version: [1.0.x, 1.1.x, latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run lint
        continue-on-error: true

      - name: Run integration tests
        run: bun run test
        env:
          CI: true

      - name: Run agent detection tests
        run: bun test tests/agent-detection.test.ts
        env:
          CI: true

      - name: Run error handling tests
        run: bun test tests/error-handling.test.ts
        env:
          CI: true

      - name: Build binary
        run: bun run build
        continue-on-error: true

  test-with-tmux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install dependencies
        run: bun install

      - name: Start tmux session
        run: |
          tmux new-session -d -s test-session
          tmux send-keys -t test-session 'echo "Pane 1"' Enter
          tmux split-window -t test-session
          tmux send-keys -t test-session 'echo "Pane 2"' Enter
          tmux list-panes -a

      - name: Run tests with tmux
        run: bun run test
        env:
          CI: true

      - name: Test actual data collection
        run: |
          # Quick smoke test
          bun run -c 'import { collectPanes } from "./src/tmux.ts"; console.log(JSON.stringify(await collectPanes(), null, 2))' || true
